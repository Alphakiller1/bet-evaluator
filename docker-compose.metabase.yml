# Metabase BI for the betting warehouse (read-only exploration of Supabase).
#
#   docker compose -f docker-compose.metabase.yml up -d
#   open http://localhost:3000  -> finish setup
#   Admin > Databases > Add database > PostgreSQL, using your Supabase host/port/db
#   and the metabase_ro role (see backtest/metabase_setup.sql).
#
# Metabase keeps its own app state in the local volume; it only READS Supabase.
services:
  metabase:
    image: metabase/metabase:latest
    container_name: mlbma-metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabase-data:/metabase-data
    restart: unless-stopped

volumes:
  metabase-data:
